version: "3.9"

services:
  backend:
    build:
      context: .
      dockerfile: Dockerfile
    ports:
      - "8080:8080"
    environment:
      - MINI_API_SERVER_PORT=8080
      - MINI_API_DATABASE_PATH=/app/data/mini-api.db
      - MINI_API_JWT_SECRET=${JWT_SECRET:-change-me-in-production}
      - MINI_API_LOG_LEVEL=info
    volumes:
      - db_data:/app/data
    restart: unless-stopped

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    ports:
      - "3000:80"
    depends_on:
      - backend
    restart: unless-stopped

volumes:
  db_data:
